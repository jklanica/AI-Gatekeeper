version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai-gatekeeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai-gatekeeper}
      POSTGRES_DB: ${POSTGRES_DB:-ai-gatekeeper}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PROXY_PORT=${PROXY_PORT:-3001}
      - DATABASE_URL=postgres://${POSTGRES_USER:-ai-gatekeeper}:${POSTGRES_PASSWORD:-ai-gatekeeper}@postgres:5432/${POSTGRES_DB:-ai-gatekeeper}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}

    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - PROXY_BASE_URL=http://proxy:${PROXY_PORT:-3001}/v1
      - DATABASE_URL=postgres://${POSTGRES_USER:-ai-gatekeeper}:${POSTGRES_PASSWORD:-ai-gatekeeper}@postgres:5432/${POSTGRES_DB:-ai-gatekeeper}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - proxy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
