name: Promote to Production

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v', like v1.0.0

permissions:
  contents: read

jobs:
  promote:
    name: Promote Staging Image to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        # When a tag is pushed, GITHUB_SHA is the commit the tag points to.
        # This allows us to find the exact staging image that was built for this commit.
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Promote Web Image
        run: |
          # 1. Pull the exact image we tested in Staging
          docker pull ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ steps.slug.outputs.sha8 }}
          
          # 2. Tag it with the release version (e.g. v1.0.0)
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ github.ref_name }}
          
          # 3. Tag it with latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:latest
          
          # 4. Push the new production tags
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:latest

      - name: Promote Proxy Image
        run: |
          # 1. Pull the exact image we tested in Staging
          docker pull ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ steps.slug.outputs.sha8 }}
          
          # 2. Tag it with the release version
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ github.ref_name }}
          
          # 3. Tag it with latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:latest
          
          # 4. Push the new production tags
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:latest

      - name: Promote Migrator Image
        run: |
          # 1. Pull the exact image we tested in Staging
          docker pull ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ steps.slug.outputs.sha8 }}
          
          # 2. Tag it with the release version
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ github.ref_name }}
          
          # 3. Tag it with latest
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ steps.slug.outputs.sha8 }} ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:latest
          
          # 4. Push the new production tags
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:latest
