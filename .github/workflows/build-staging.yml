name: Staging Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Lint and Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache TurboRepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript check
        run: pnpm run typecheck

  build-and-push:
    name: Build and Push Docker Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:${{ steps.slug.outputs.sha8 }}
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:staging
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-web:buildcache,mode=max

      - name: Build and push Proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/proxy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:${{ steps.slug.outputs.sha8 }}
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:staging
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-proxy:buildcache,mode=max

      - name: Build and push Migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/migrator/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:${{ steps.slug.outputs.sha8 }}
            ${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:staging
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ai-gatekeeper-migrator:buildcache,mode=max
